<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffin Pomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="timer-container">
        <div class="mode-switch">
            <button id="work-btn" class="active">Work</button>
            <button id="break-btn">Break</button>
        </div>

        <div class="svg-wrapper">
            <svg viewBox="0 0 100 150" id="coffin-svg">
                <defs>
                    <clipPath id="coffin-clip">
                        <path d="M50 5 L85 40 L80 145 L20 145 L15 40 Z" />
                    </clipPath>
                </defs>

                <path class="coffin-bg" d="M50 5 L85 40 L80 145 L20 145 L15 40 Z" fill="#1a1a1a" stroke="#333" stroke-width="2"/>

                <g clip-path="url(#coffin-clip)">
                    <path id="wave-back" class="wave" d="M 0 50 Q 25 45 50 50 T 100 50 V 200 H 0 Z" opacity="0.4" />
                    <path id="wave-front" class="wave" d="M 0 50 Q 25 40 50 50 T 100 50 V 200 H 0 Z" />
                </g>
                
                <text id="display" x="50" y="80" text-anchor="middle" font-family="monospace" font-size="12" fill="white">25:00</text>
            </svg>
        </div>

        <div class="actions">
            <button id="start-btn">Start</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<svg viewBox="0 0 100 150" class="coffin-timer">
  <defs>
    <clipPath id="coffin-clip">
      <path d="M50 5 L85 40 L80 145 L20 145 L15 40 Z" />
    </clipPath>
  </defs>

  <path class="coffin-border" d="M50 5 L85 40 L80 145 L20 145 L15 40 Z" 
        fill="none" stroke="#333" stroke-width="2" />

  <g clip-path="url(#coffin-clip)">
    <rect width="100" height="150" fill="#1a1a1a" />
    
    <path id="wave" d="M 0 50 Q 25 40 50 50 T 100 50 V 200 H 0 Z">
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0 0" 
        to="-50 0" 
        dur="3s" 
        repeatCount="indefinite" />
    </path>
  </g>
</svg>
